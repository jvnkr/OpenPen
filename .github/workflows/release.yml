name: Release

# Cut a release by pushing a version tag that matches package.json's version:
#   npm version patch   # bumps package.json + commits + tags vX.Y.Z
#   git push --follow-tags
# electron-builder builds Windows x64 + arm64 installers and uploads them to a
# published GitHub Release for that tag (not a draft — tied to the tag, Latest).
#
# workflow_dispatch runs the same build without publishing and leaves the
# installers as a downloadable workflow artifact, so the pipeline can be tested
# without cutting a real release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

# Never let two release runs for the same ref upload to the release at once —
# concurrent runs split artifacts across duplicate releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main
        run: pnpm build

      - name: Package installers
        # Publish to the GitHub Release only for tag pushes; a manual run just
        # builds so the pipeline can be smoke-tested without releasing.
        run: pnpm exec electron-builder --win --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate artifact attestation
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest@v4
        with:
          subject-path: |
            release/*.exe
            release/*.zip

      - name: Upload installers as a workflow artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: openpen-windows-installers
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error
